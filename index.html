<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения, симпатулька!</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;

        h1 {
            color: #d63384;
            font-size: 48px;
        }
        p {

        }

        }

<body>
    <h1>С Днём Рождения, симпатулька!</h1>
    <p>Ты – самое прекрасное, что случилось в моей жизни. С каждым днём я люблю тебя всё больше и больше.</p>
    <p>Сегодня твой день, и я хочу, чтобы он был таким же удивительным, как ты!</p>
    <button class="btn" onclick="alert('Люблю тебя! ❤️')">Нажми, если любишь меня</button>

</html>
