<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поздравляю, мой ангел</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Поздравляю, мой ангел</h1>

    <div class="magic-block">
        <p>Эй, ты объявлена в розыск, ты знала? Подробности внизу👇</p>
    </div>

    <!-- Сворачиваемый блок с видео -->
    <div class="collapsible">
        <div class="shortcut" onclick="toggleContent(this, 'video-iframe')">🎥 Моё видео для тебя</div>
        <div class="collapsible-content">
            <iframe src="https://www.tiktok.com/embed/v3/7064446431251254530" width="300" height="350" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            <!--<iframe id="video-iframe" width="300" height="625" frameborder="0" allow="autoplay"></iframe>-->
        </div>
    </div>

    <!-- Сворачиваемый блок с инструкцией -->
    <div class="collapsible">
        <div class="shortcut" onclick="toggleContent(this)">🔍 Куда дальше?</div>
        <div class="magic-block" style="display: none;">
            <p>Мы с ребятами посовещались и поняли, что очень любим кольцевые композиции. К кольцам это не имеет никакого отношения, если ты понимаешь, о чем я😉</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
